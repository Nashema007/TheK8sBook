# Some network drivers and laptop VM implementations cause issues with Service port mapping
# Minikube users may have to `minikube service svc-sidecar` to be able to access on `localhost:30001`
# Other users may have to run `kubectl port-forward service/svc-sidecar 30001:80`
apiVersion: v1
kind: Pod
metadata:
  name: git-sync
  labels:
    app: sidecar
spec:
  containers:
  - name: ctr-web
    image: nginx
    volumeMounts:
    - name: html
      mountPath: /usr/share/nginx/
  - name: ctr-sync
    image: registry.k8s.io/git-sync/git-sync:v4.4.1
    volumeMounts:
    - name: html
      mountPath: /git
    env:
    - name: GITSYNC_REPO
      value: https://github.com/Nashema007/ps-sidecar.git
    - name: GITSYNC_REF
      value: master
    - name: GITSYNC_DEPTH
      value: "1"
    - name: GITSYNC_LINK
      value: "html"
  volumes:
  - name: html
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: svc-sidecar
spec:
  selector:
    app: sidecar
  type: NodePort
  ports:
  - port: 80
    nodePort: 30001
